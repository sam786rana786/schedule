services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fastapi-backend
    container_name: fastapi-backend
    restart: unless-stopped
    tty: true
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=mysql+pymysql://secure_user:S3cur3P@ssw0rd!@mysql:3306/secure_db
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - app-network
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: vue-frontend
    container_name: vue-frontend
    restart: unless-stopped
    tty: true
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    ports:
      - "8080:8080"
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: S3cur3P@ssw0rd!
      MYSQL_DATABASE: secure_db
      MYSQL_USER: secure_user
      MYSQL_PASSWORD: S3cur3P@ssw0rd!
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data: